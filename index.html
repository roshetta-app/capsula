<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Prevent the browser from HTTP-caching this file.
      After a Vite build, asset filenames change (content hashes). If the
      browser serves a stale index.html it requests old hashed filenames
      that no longer exist on the server → 404 → blank page on desktop.
      no-store forces a network fetch every time, which is correct for an
      app shell whose only real content is a <script> tag.
    -->
    <meta http-equiv="Cache-Control" content="no-store" />

    <!-- Critical for mobile display -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Theme color (browser chrome color on Android) -->
    <meta name="theme-color" content="#FAFAF9" />

    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Capsula" />
    <link rel="apple-touch-icon" href="/capsula/icons/icon-192.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/capsula/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/capsula/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/capsula/favicon-32.png" />

    <title>Capsula</title>

    <!--
      GitHub Pages SPA redirect — decode script.
      Companion to public/404.html.
      Runs before React boots: reads sessionStorage set by 404.html,
      restores the original path via history.replaceState so React Router
      sees the correct URL on mount.
    -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('gh_pages_redirect');
        if (redirect) {
          sessionStorage.removeItem('gh_pages_redirect');
          try {
            var data = JSON.parse(redirect);
            var url = window.location.protocol + '//' + window.location.host +
                      '/capsula' + data.path +
                      (data.query ? '?' + data.query : '') +
                      (data.hash  ? '#' + data.hash  : '');
            window.history.replaceState(null, null, url);
          } catch(e) {}
        }
      })();
    </script>

    <!--
      Blank-on-deploy mitigation (GH Pages CDN propagation race).

      During the ~10 min a new deploy takes to fully propagate across
      GitHub Pages' CDN edges, a fresh navigation (e.g. opening /admin,
      which always re-runs the 404.html redirect chain — unlike the main
      app, which is usually already open) can land on an edge node still
      serving a mismatched index.html / asset-bundle pairing. The bundle
      404s, React never mounts, and #root stays empty with no feedback.

      This can't be prevented from here (it's GH Pages' own propagation
      delay), but it can be made to self-heal: if the main module script
      fails to load, retry with a cache-busted URL a few times before
      giving up with a visible reload link instead of a silent blank page.
      The retry counter is cleared in main.jsx once the module actually
      starts executing, so this only ever fires on a genuine load failure.
    -->
    <script>
      window.__mainLoadFailed = function () {
        var key = 'capsula_boot_retry_count';
        var n = parseInt(sessionStorage.getItem(key) || '0', 10);
        if (n >= 3) {
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML =
              '<div style="padding:48px 24px;text-align:center;font-family:system-ui,sans-serif;color:#57534E">' +
              '<p style="margin-bottom:16px;">Capsula is finishing an update — this is taking longer than usual.</p>' +
              '<a href="/capsula/" style="color:#0F766E;font-weight:600;text-decoration:underline;">Tap here to reload</a>' +
              '</div>';
          }
          return;
        }
        sessionStorage.setItem(key, String(n + 1));
        setTimeout(function () {
          window.location.replace('/capsula/?boot-retry=' + Date.now());
        }, 2500);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx" onerror="window.__mainLoadFailed()"></script>
  </body>
</html>
