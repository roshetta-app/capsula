<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Capsula</title>
  <script>
    /**
     * GitHub Pages SPA redirect — 404.html
     *
     * When GH Pages gets a request for /capsula/drugs or /capsula/favourites,
     * it finds no physical file and serves this 404.html instead.
     *
     * This script encodes the full path into sessionStorage and redirects
     * to the root /capsula/ so the React app loads, then the companion
     * script in index.html decodes it and restores the original URL via
     * history.replaceState — all before React renders.
     *
     * Guard: if sessionStorage already contains a gh_pages_redirect entry
     * we are in a SW-triggered reload loop — do NOT overwrite the saved
     * path and do NOT redirect again; let index.html decode it normally.
     *
     * The path segment count (1) matches the depth of the GitHub Pages
     * subdirectory (/capsula/ = 1 segment).
     */
    (function () {
      var l = window.location;
      var segmentCount = 1;

      // If a redirect is already pending (set by a previous pass through this
      // file), a SW RELOAD fired before index.html could decode it.
      // Clear the stale entry and start fresh so the user isn't stuck.
      var existing = sessionStorage.getItem('gh_pages_redirect');
      if (existing) {
        sessionStorage.removeItem('gh_pages_redirect');
      }

      var path  = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
      var query = l.search.slice(1);
      var hash  = l.hash.slice(1);

      // Only redirect for real sub-paths — not for the root itself.
      // This prevents an infinite redirect if GH Pages ever 404s on /capsula/.
      if (!path || path === '') {
        // Nothing to redirect — let the browser handle it.
        return;
      }

      sessionStorage.setItem(
        'gh_pages_redirect',
        JSON.stringify({
          path:  '/' + path,
          query: query,
          hash:  hash,
        })
      );

      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=1'
      );
    }());
  </script>
</head>
<body>
  <!-- Redirecting to Capsula... -->
</body>
</html>
